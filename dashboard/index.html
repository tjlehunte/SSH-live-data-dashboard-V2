<!DOCTYPE html>
<html>
  <head>
    <title>Salford Smart Home Monnit Sensors</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/flavicon.ico">
  </head>

  <!-- UOS logos -->
  <img src="UOS-logo-light.png" id="uos-logo-light">
  <img src="UOS-logo-dark.png" id="uos-logo-dark">
  
  <!-- SML SSH logos -->
  <img src="sml-logo-light.png" id="sml-logo-light">
  <img src="sml-logo-dark.png" id="sml-logo-dark">
  
  <body>
    <h1>Salford Smart Home Live Data Dashboard</h1>
    
    <div class="chart-section">
      
      <!-- Master tabs -->
      <div id="masterTabs" class="tab-row">
        <div class="tab master-tab active" data-master="environment" title="Temperature, Humidity, Dew Point and more">Environment</div>
        <div class="tab master-tab" data-master="current" title="Main incoming current metrics and cumulative">Current (A)</div>
      </div>
      
      <!-- Environment sub-tabs -->
      <div id="envTabs" class="tab-row sub-tab-row">
        <div class="tab active" data-type="temperature" title="Temperature (°C)">Temperature</div>
        <div class="tab" data-type="humidity" title="Relative humidity (%)">Humidity</div>
        <div class="tab" data-type="dewpoint" title="Dewpoint (°C)">Dew Point</div>
        <div class="tab" data-type="gpkg" title="Grams of water vapor per kilogram of air (g/kg)">Grams per kg</div>
        <div class="tab" data-type="heatindex" title="'Feels like' temperature">Heat Index</div>
        <div class="tab" data-type="wetbulb" title="The theoretical temperature of the air is at 100% relative humidity">Wet Bulb</div>
      </div>
      
      <!-- Current sub-tabs -->
      <div id="currentTabs" class="tab-row sub-tab-row" style="display:none;">
        <div class="tab active" data-type="current-summary" title="Minimum, maximum and average current over the last 10 minutes">Current (Min / Max / Avg)</div>
        <div class="tab" data-type="current-cumulative" title="Cumulative Amp Hours">Current (Cumulative)</div>
      </div>
      
      <div class="chart-container">
        <div class="chart-spinner" id="spinner"></div>
        <canvas id="mainChart"></canvas>
      </div>
    
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
