<!DOCTYPE html>
<html>
<head>
  <title>Salford Smart Home Monnit Sensors</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/flavicon.ico">
</head>

<body>
<h1>Salford Smart Home - Monnit Sensor Dashboard</h1>

<div id="loading" class="spinner"></div>

<!-- Temperature, humidity etc graph section -->
<div class="envchart-section">
  <div class="tab-row">
    <div class="tab active" data-type="temperature">Temperature</div>
    <div class="tab" data-type="humidity">Humidity</div>
    <div class="tab" data-type="dewpoint">Dew Point</div>
    <div class="tab" data-type="gpkg">Grams per kg</div>
    <div class="tab" data-type="heatindex">Heat Index</div>
    <div class="tab" data-type="wetbulb">Wet Bulb</div>
  </div>

  <div class="chart-container">
    <canvas id="mainChart"></canvas>
  </div>
</div>

  
<!-- Cumulative current, current stats graph section -->
<div class="currentchart-section">
  <div class="tab-row">
    <div class="tab" data-type="current3">Current (Min / Max / Avg)</div>
    <div class="tab" data-type="currentcum">Current (Cumulative)</div>
  </div>
  
  <div class="chart-container">
    <canvas id="currentChart"></canvas>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
